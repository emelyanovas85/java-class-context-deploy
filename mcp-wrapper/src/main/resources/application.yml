server:
  port: 8080

spring:
  application:
    name: java-class-context-mcp
  jackson:
    serialization:
      indent-output: true
  ai:
    mcp:
      server:
        name: java-class-context-mcp
        version: 1.0.0
        type: SYNC
        # Spring AI 1.0.0 поддерживает STREAMABLE_HTTP.
        # Open WebUI использует streamablehttp_client (MCP протокол 2024-11-05).
        # Endpoint: POST /mcp
        protocol: STREAMABLE_HTTP
        instructions: >
          Обёртка над Java Class Context API: структурный анализ Java-классов по GitLab Merge Request.
          Сначала вызовите create_review_session (вернёт sessionId), затем используйте sessionId
          в инструментах структуры/исходников. get_source_lines_jar работает без сессии.

app:
  upstream:
    base-url: ${APP_UPSTREAM_BASE_URL:http://10.1.5.97:8084}
    connect-timeout: ${APP_UPSTREAM_CONNECT_TIMEOUT:5000}
    read-timeout: ${APP_UPSTREAM_READ_TIMEOUT:120000}

logging:
  level:
    service.mcp: ${LOGGING_LEVEL_SERVICE_MCP:INFO}
    io.modelcontextprotocol: ${LOGGING_LEVEL_MCP:INFO}
