services:
  java-context-mcp:
    image: java-class-context-mcp:latest
    ports:
      - "8086:8080"
    environment:
      # Адрес основного сервиса Java Class Context API.
      # На целевом сервере основной сервис развёрнут на 10.1.5.97:8084.
      APP_UPSTREAM_BASE_URL: ${APP_UPSTREAM_BASE_URL:-http://10.1.5.97:8084}
      APP_UPSTREAM_CONNECT_TIMEOUT: "5000"
      APP_UPSTREAM_READ_TIMEOUT: "120000"
      LOGGING_LEVEL_SERVICE_MCP: INFO
    restart: unless-stopped
