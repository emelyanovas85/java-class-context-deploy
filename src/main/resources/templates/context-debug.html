<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Context debug</title>
  <style>__CONTEXT_CSS__</style>
</head>
<body class="is-loading">
  <div id="ctx-loading" class="ctx-loading" role="status" aria-live="polite">
    <div class="ctx-spinner" aria-hidden="true"></div>
    <p class="ctx-loading-text">Загрузка контекста…</p>
  </div>
  <div id="ctx-app" class="ctx-app">
  <header class="page-header">
    <h1>Context debug</h1>
    <p class="meta" id="page-meta"></p>
    <p class="legend">Подсветка <mark class="ctx-type">жёлтым</mark> — все типы из контекста
      (<span id="type-count">0</span> шт., включая nested). Наведите — qualified name и id контекста
      (для nested — id top-level класса).</p>
  </header>
  <div class="page-toolbar">
    <label><input type="checkbox" id="pin-index" checked> Закрепить оглавление</label>
  </div>
  <div class="layout-body pinned" id="layout-body">
    <nav class="ctx-index" id="ctx-index"></nav>
    <main class="ctx-sections" id="ctx-sections"></main>
  </div>
  </div>
  <script type="application/json" id="ctx-request">__CONTEXT_REQUEST__</script>
  <script>__CONTEXT_JS__</script>
</body>
</html>
