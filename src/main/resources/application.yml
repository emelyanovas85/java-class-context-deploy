server:
  port: 8080

spring:
  application:
    name: java-structure-service
  jackson:
    serialization:
      indent-output: true

app:
  file-index-cache:
    expire-after-access-minutes: 15
  parse-cache:
    enabled: true
    dir: artifacts
    expire-after-access-minutes: 10
  review-session:
    ttl-minutes: 60
    uid-length: 8
    diff-refs-retry-attempts: 3
    diff-refs-retry-delay-ms: 500

logging:
  level:
    service.structure.context: DEBUG
